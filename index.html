<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>Kazakhstan Tourism</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">🇰🇿 QAZ TOUR</div>

  <nav id="nav">
    <a href="#" class="nav-link active" data-page="home">Басты бет</a>
    <a href="#" class="nav-link" data-page="about">Туралы</a>
    <a href="#" class="nav-link" data-page="gallery">Галерея</a>
    <a href="#" class="nav-link" data-page="contact">Байланыс</a>
  </nav>

  <div class="burger" id="burger">☰</div>

  <button id="openModal">Кіру</button>
  <button id="darkToggle">🌙</button>
</header>

<main>

<!-- HOME -->
<section id="home" class="page active">
  <h1>Қазақстан туризмі 🇰🇿</h1>

  <div class="slider">
    <button id="prev">⬅</button>
    <img id="slideImg" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Almaty_Medeu.jpg">
    <button id="next">➡</button>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="page">
  <h2>Туралы</h2>
  <p>Қазақстан – табиғаты әсем, таулары мен көлдері бар керемет ел.</p>
</section>

<!-- GALLERY -->
<section id="gallery" class="page">
  <h2>Галерея</h2>

  <div class="grid">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Almaty_Medeu.jpg" alt="Almaty">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5d/Burabay_National_Park.jpg" alt="Burabay">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Charyn_Canyon.jpg" alt="Charyn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Baiterek_Tower_Astana.jpg" alt="Astana">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="page">
  <h2>Байланыс</h2>

  <form id="contactForm">
    <input type="text" placeholder="Атыңыз" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Хабарлама"></textarea>
    <button type="submit">Жіберу</button>
  </form>
</section>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeModal">✖</span>

    <h2>Кіру</h2>
    <input type="text" placeholder="Логин">
    <input type="password" placeholder="Құпиясөз">
    <button>Кіру</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
