<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>Қазақстан Туризмі</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- НАВИГАЦИЯ -->
<header>
  <h2>🇰🇿 Tourism KZ</h2>
  <div class="burger" onclick="toggleMenu()">☰</div>
  <nav id="menu">
    <a href="#" onclick="showSection('home')">Басты бет</a>
    <a href="#" onclick="showSection('about')">Туралы</a>
    <a href="#" onclick="showSection('gallery')">Галерея</a>
    <a href="#" onclick="showSection('contact')">Байланыс</a>
  </nav>
</header>

<!-- МОДАЛ -->
<button onclick="openModal()">Кіру / Тіркелу</button>

<div id="modal" class="modal" onclick="outsideClick(event)">
  <div class="modal-content">
    <span onclick="closeModal()">✖</span>
    <h2>Тіркелу</h2>
    <input type="text" placeholder="Атыңыз">
    <input type="email" placeholder="Email">
    <button>Жіберу</button>
  </div>
</div>

<!-- БӨЛІМДЕР -->
<section id="home" class="active">
  <h1>Қазақстанға қош келдіңіз!</h1>
  <p>Туризмді бірге зерттейік</p>
</section>

<section id="about">
  <h1>Қазақстан туралы</h1>
  <p>Қазақстан — табиғаты әдемі ел.</p>
</section>

<section id="gallery">
  <h1>Галерея</h1>
  <div class="slider">
    <button onclick="prevSlide()">⬅</button>
    <img id="slide" src="images/1.jpg">
    <button onclick="nextSlide()">➡</button>
  </div>
</section>

<section id="contact">
  <h1>Байланыс</h1>
  <form onsubmit="saveData(event)">
    <input type="text" placeholder="Атыңыз" id="name" required>
    <button type="submit">Жіберу</button>
  </form>
</section>

<!-- DARK MODE -->
<button onclick="toggleDark()">🌙</button>

<script src="script.js"></script>
</body>
</html>
