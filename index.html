<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>Kazakhstan Tourism NEXT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO VIDEO -->
<section class="hero">
  <video autoplay muted loop>
    <source src="video/kazakhstan.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h1>🇰🇿 Kazakhstan Tourism</h1>
    <p>Explore the beauty of Kazakhstan</p>

    <input id="nameInput" placeholder="Атыңызды енгізіңіз">
    <button onclick="saveName()">Бастау</button>
  </div>
</section>

<!-- NAV -->
<header>
  <nav>
    <a onclick="show('home')">Басты</a>
    <a onclick="show('places')">Орындар</a>
    <a onclick="show('map')">Карта</a>
    <a onclick="show('chat')">Чатбот</a>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="page active">
  <h2 id="welcome"></h2>
</section>

<!-- PLACES -->
<section id="places" class="page">
  <h2>Туристік орындар ⭐</h2>

  <div class="cards">

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Almaty_Medeu.jpg">
      <h3>Алматы</h3>
      <button onclick="fav('Almaty')">❤️</button>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5d/Burabay_National_Park.jpg">
      <h3>Бурабай</h3>
      <button onclick="fav('Burabay')">❤️</button>
    </div>

  </div>
</section>

<!-- MAP -->
<section id="map" class="page">
  <h2>Карта 🗺</h2>
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2924.9!2d76.9286!3d43.2567!2m3!1f0!2f0!3f0!3m2!1i1024!2i768"
    width="100%" height="400"></iframe>
</section>

<!-- CHATBOT -->
<section id="chat" class="page">
  <h2>Tour Guide Bot 🤖</h2>

  <div id="chatBox"></div>

  <input id="msg" placeholder="Сұрақ жаз...">
  <button onclick="sendMsg()">Жіберу</button>
</section>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
