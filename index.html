<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>Kazakhstan Tourism FIX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🇰🇿 Kazakhstan Tourism</h1>

  <nav>
    <a onclick="show('home')">Басты</a>
    <a onclick="show('about')">Туралы</a>
    <a onclick="show('gallery')">Галерея</a>
    <button id="openModal">Кіру</button>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="page active">
  <h2>Қош келдің!</h2>
</section>

<!-- ABOUT -->
<section id="about" class="page">
  <h2>Қазақстан туралы</h2>
  <p>Табиғаты әдемі ел 🇰🇿</p>
</section>

<!-- GALLERY -->
<section id="gallery" class="page">
  <h2>Галерея</h2>

  <div class="grid">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Almaty_Medeu.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5d/Burabay_National_Park.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Charyn_Canyon.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Baiterek_Tower_Astana.jpg">
  </div>
</section>

<!-- MODAL -->
<div id="modal">
  <div class="box">
    <span id="close">✖</span>

    <h3>Кіру</h3>
    <input placeholder="Логин">
    <input type="password" placeholder="Құпиясөз">
    <button>Enter</button>
  </div>
</div>

<!-- IMPORTANT FIX -->
<script src="script.js"></script>

</body>
</html>
